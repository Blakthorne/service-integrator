name: Build and Deploy

on:
    push:
        branches:
            - main

# Minimal default permissions. Jobs request only what they need.
permissions:
    contents: read

# Prevent overlapping production deploys.
concurrency:
    group: production-deploy
    cancel-in-progress: false

jobs:
    build-deploy:
        runs-on: ubuntu-latest
        environment: ${{ vars.DEPLOY_ENVIRONMENT || 'production' }}

        steps:
            - name: Checkout code
              # Verify SHA at https://github.com/actions/checkout/releases
              uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

            - name: Set up Node.js
              # Verify SHA at https://github.com/actions/setup-node/releases
              uses: actions/setup-node@60edb5dd545a775178f52524783378180af0d1f8 # v4.0.2
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build app
              # Only NEXT_PUBLIC_* vars are needed at build time.
              env:
                  NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
              run: npm run build

            - name: Create deployment package
              run: |
                  mkdir -p deploy
                  cp -r .next deploy/
                  cp -r public deploy/ 2>/dev/null || :
                  cp package.json package-lock.json next.config.ts deploy/

                  cd deploy && npm ci --omit=dev --ignore-scripts && cd ..

                  tar -czf deploy.tar.gz -C deploy .

            # Netbird ephemeral peer
            - name: Install Netbird
              run: |
                  curl -fsSL https://pkgs.netbird.io/debian/public.key \
                    | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/netbird.gpg
                  echo "deb https://pkgs.netbird.io/debian stable main" \
                    | sudo tee /etc/apt/sources.list.d/netbird.list > /dev/null
                  sudo apt-get update -qq
                  sudo apt-get install -y netbird

            - name: Connect to Netbird network
              env:
                  NETBIRD_SETUP_KEY: ${{ secrets.NETBIRD_SETUP_KEY }}
              run: |
                  sudo netbird up \
                    --setup-key "$NETBIRD_SETUP_KEY" \
                    --hostname "github-runner-${{ github.run_id }}"
                  timeout 60 bash -c \
                    'until sudo netbird status 2>&1 | grep -qi "connected"; do sleep 2; done'
                  echo "Connected to Netbird network"

            # SSH setup
            - name: Setup SSH
              env:
                  SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
                  DEPLOY_HOST_PUBKEY: ${{ secrets.DEPLOY_HOST_PUBKEY }}
              run: |
                  mkdir -p ~/.ssh
                  chmod 700 ~/.ssh
                  printf '%s\n' "$SSH_PRIVATE_KEY" | install -m 600 /dev/stdin ~/.ssh/deploy_key
                  printf '%s %s\n' "$DEPLOY_HOST" "$DEPLOY_HOST_PUBKEY" >> ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

            # Deploy
            - name: Wait for SSH reachability
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
              run: |
                  KEYSCAN_DONE=false
                  for attempt in {1..30}; do
                      # Fetch all host key types once the host is reachable.
                      # Covers key-type mismatches with the static DEPLOY_HOST_PUBKEY entry.
                      if [ "$KEYSCAN_DONE" = false ]; then
                          if ssh-keyscan -T 5 -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null; then
                              KEYSCAN_DONE=true
                          fi
                      fi

                      if SSH_OUTPUT="$(ssh -i ~/.ssh/deploy_key \
                        -o ProxyCommand=none \
                        -o StrictHostKeyChecking=yes \
                        -o BatchMode=yes \
                        -o ConnectTimeout=5 \
                        -p "$DEPLOY_PORT" \
                        "$DEPLOY_USER@$DEPLOY_HOST" \
                        'echo ssh-ready' 2>&1 >/dev/null)"; then
                          echo "SSH is reachable"
                          exit 0
                      fi

                      echo "Last SSH error: $SSH_OUTPUT"
                      echo "Waiting for SSH reachability (attempt $attempt/30)..."
                      sleep 2
                  done

                  echo "SSH did not become reachable in time"
                  exit 1

            - name: Transfer deployment package
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
              run: |
                  for attempt in {1..5}; do
                      if scp -i ~/.ssh/deploy_key \
                        -o ProxyCommand=none \
                        -P "$DEPLOY_PORT" \
                        -o StrictHostKeyChecking=yes \
                        -o BatchMode=yes \
                        -o ConnectTimeout=10 \
                        deploy.tar.gz \
                        "$DEPLOY_USER@$DEPLOY_HOST:/tmp/deploy.tar.gz"; then
                          echo "Transfer succeeded"
                          exit 0
                      fi

                      echo "Transfer failed (attempt $attempt/5); retrying in 5s..."
                      sleep 5
                  done

                  echo "Transfer failed after retries"
                  exit 1

            # Secrets are streamed directly to the server.
            - name: Write env file on server
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
                  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
                  AUTH_URL: ${{ secrets.AUTH_URL }}
                  AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
                  AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
                  ALLOWED_EMAIL_1: ${{ secrets.ALLOWED_EMAIL_1 }}
                  ALLOWED_EMAIL_2: ${{ secrets.ALLOWED_EMAIL_2 }}
                  PLANNING_CENTER_ID: ${{ secrets.PLANNING_CENTER_ID }}
                  PLANNING_CENTER_TOKEN: ${{ secrets.PLANNING_CENTER_TOKEN }}
                  NEXT_PUBLIC_BASE_URL: ${{ secrets.NEXT_PUBLIC_BASE_URL }}
              run: |
                  printf 'AUTH_SECRET=%s\nAUTH_URL=%s\nAUTH_GOOGLE_ID=%s\nAUTH_GOOGLE_SECRET=%s\nALLOWED_EMAIL_1=%s\nALLOWED_EMAIL_2=%s\nPLANNING_CENTER_ID=%s\nPLANNING_CENTER_TOKEN=%s\nNEXT_PUBLIC_BASE_URL=%s\n' \
                    "$AUTH_SECRET" "$AUTH_URL" "$AUTH_GOOGLE_ID" "$AUTH_GOOGLE_SECRET" \
                    "$ALLOWED_EMAIL_1" "$ALLOWED_EMAIL_2" \
                    "$PLANNING_CENTER_ID" "$PLANNING_CENTER_TOKEN" \
                    "$NEXT_PUBLIC_BASE_URL" \
                  | ssh -i ~/.ssh/deploy_key \
                      -o ProxyCommand=none \
                      -p "$DEPLOY_PORT" \
                      -o StrictHostKeyChecking=yes \
                      -o BatchMode=yes \
                      "$DEPLOY_USER@$DEPLOY_HOST" \
                      'mkdir -p ~/service-integrator && cat > ~/service-integrator/.env.production && chmod 600 ~/service-integrator/.env.production'

            - name: Extract and restart
              env:
                  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
                  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
                  DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
              run: |
                  ssh -i ~/.ssh/deploy_key \
                    -o ProxyCommand=none \
                    -p "$DEPLOY_PORT" \
                    -o StrictHostKeyChecking=yes \
                    -o BatchMode=yes \
                    "$DEPLOY_USER@$DEPLOY_HOST" \
                    'set -e
                     cd ~/service-integrator
                     tar -xzf /tmp/deploy.tar.gz
                     rm -f /tmp/deploy.tar.gz
                     pm2 restart service-integrator || pm2 start npm --name service-integrator -- start'

            - name: Disconnect from Netbird
              if: always()
              run: sudo netbird down
